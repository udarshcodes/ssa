{% extends "layout.html" %}

{% block title %}
    Authentication
{% endblock %}

{% block main %}
<div class="auth-container glass-card mx-auto position-relative shadow-lg border-0" style="background: rgba(24, 24, 27, 0.8);">
    
    <!-- Tab Toggle -->
    <div class="d-flex justify-content-center mb-4 pb-2">
        <div class="btn-group p-1" style="background: rgba(0,0,0,0.3); border-radius: 12px; border: 1px solid var(--glass-border);" role="group">
            <button type="button" id="tab-login" class="btn btn-sm px-4 fw-medium {% if active_tab == 'login' %}btn-primary{% else %}text-muted border-0{% endif %}" style="border-radius: 10px;" onclick="switchTab('login')">Login</button>
            <button type="button" id="tab-register" class="btn btn-sm px-4 fw-medium {% if active_tab == 'register' %}btn-primary{% else %}text-muted border-0{% endif %}" style="border-radius: 10px;" onclick="switchTab('register')">Register</button>
        </div>
    </div>

    <!-- Header -->
    <div class="text-center mb-4">
        <div class="icon-container mx-auto p-0 border-0" style="background: transparent; width: 64px; height: 64px; margin-bottom: 1rem;">
            <img src="/static/images/logo.png" alt="Logo" width="64" height="64" style="border-radius: 16px; box-shadow: 0 4px 14px 0 var(--primary-glow);">
        </div>
        <h2 class="mb-0 fw-bold">StudyForge</h2>
        <p class="text-muted small">Access your personalized workspace</p>
    </div>

    <!-- Login Form -->
    <form id="form-login" action="/login" method="post" class="d-flex flex-column gap-3" style="{% if active_tab != 'login' %}display: none !important;{% endif %}">
        <div class="form-group text-start">
            <label for="login-username" class="form-label">Username</label>
            <input autocomplete="off" autofocus class="form-control" id="login-username" name="username" type="text" required>
        </div>
        
        <div class="form-group text-start">
            <label for="login-password" class="form-label d-flex justify-content-between">
                Password
                <a href="/reset_password" class="text-primary small text-decoration-none">Forgot?</a>
            </label>
            <div class="input-group">
                <input class="form-control border-end-0" style="border-top-right-radius: 0; border-bottom-right-radius: 0;" id="login-password" name="password" type="password" required>
                <button class="btn border border-start-0 px-3" type="button" style="border-top-right-radius: 10px; border-bottom-right-radius: 10px; background: rgba(255,255,255,0.03); border-color: var(--glass-border);" onclick="togglePassword('login-password', 'eye-icon-login')">
                    <span id="eye-icon-login" class="text-muted d-flex align-items-center justify-content-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye-fill" viewBox="0 0 16 16">
                            <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/>
                            <path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/>
                        </svg>
                    </span>
                </button>
            </div>
        </div>

        <button class="btn btn-primary py-2 mt-3 w-100 fw-bold" type="submit">Sign In</button>
    </form>

    <!-- Register Form -->
    <form id="form-register" action="/register" method="post" class="d-flex flex-column gap-3" style="{% if active_tab != 'register' %}display: none !important;{% endif %}">
        <div class="form-group text-start position-relative">
            <label for="register-username" class="form-label">Username</label>
            <input autocomplete="off" class="form-control" id="register-username" name="username" type="text" required>
            <small id="username-feedback" class="position-absolute end-0 bottom-0 mb-2 me-3 fw-medium"></small>
        </div>
        
        <div class="form-group text-start">
            <label for="register-password" class="form-label">Password</label>
            <div class="input-group">
                <input class="form-control border-end-0" style="border-top-right-radius: 0; border-bottom-right-radius: 0;" id="register-password" name="password" type="password" required>
                <button class="btn border border-start-0 px-3" type="button" style="border-top-right-radius: 10px; border-bottom-right-radius: 10px; background: rgba(255,255,255,0.03); border-color: var(--glass-border);" onclick="togglePassword('register-password', 'eye-icon-reg')">
                    <span id="eye-icon-reg" class="text-muted d-flex align-items-center justify-content-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye-fill" viewBox="0 0 16 16">
                            <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/>
                            <path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/>
                        </svg>
                    </span>
                </button>
            </div>
        </div>

        <div class="form-group text-start">
            <label for="register-confirmation" class="form-label">Confirm Password</label>
            <div class="input-group">
                <input class="form-control border-end-0" style="border-top-right-radius: 0; border-bottom-right-radius: 0;" id="register-confirmation" name="confirmation" type="password" required>
                <button class="btn border border-start-0 px-3" type="button" style="border-top-right-radius: 10px; border-bottom-right-radius: 10px; background: rgba(255,255,255,0.03); border-color: var(--glass-border);" onclick="togglePassword('register-confirmation', 'eye-icon-conf')">
                    <span id="eye-icon-conf" class="text-muted d-flex align-items-center justify-content-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye-fill" viewBox="0 0 16 16">
                            <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/>
                            <path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/>
                        </svg>
                    </span>
                </button>
            </div>
        </div>

        <button class="btn btn-primary py-2 mt-3 w-100 fw-bold" type="submit">Create Account</button>
    </form>
</div>

<script>
    // Tab Switching Logic
    function switchTab(tab) {
        const loginForm = document.getElementById('form-login');
        const regForm = document.getElementById('form-register');
        const loginBtn = document.getElementById('tab-login');
        const regBtn = document.getElementById('tab-register');

        if (tab === 'login') {
            loginForm.style.setProperty('display', 'flex', 'important');
            regForm.style.setProperty('display', 'none', 'important');
            loginBtn.classList.add('btn-primary');
            loginBtn.classList.remove('text-muted', 'border-0');
            regBtn.classList.remove('btn-primary');
            regBtn.classList.add('text-muted', 'border-0');
        } else {
            regForm.style.setProperty('display', 'flex', 'important');
            loginForm.style.setProperty('display', 'none', 'important');
            regBtn.classList.add('btn-primary');
            regBtn.classList.remove('text-muted', 'border-0');
            loginBtn.classList.remove('btn-primary');
            loginBtn.classList.add('text-muted', 'border-0');
        }
    }

    // Password Toggle Logic
    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === "password") {
            input.type = "text";
            icon.style.opacity = "1";
            icon.classList.replace('text-muted', 'text-primary');
        } else {
            input.type = "password";
            icon.style.opacity = "1";
            icon.classList.replace('text-primary', 'text-muted');
        }
    }

    // Real-time Username Checking Logic
    let typingTimer;
    const doneTypingInterval = 500;
    const usernameInput = document.getElementById('register-username');
    const feedback = document.getElementById('username-feedback');

    usernameInput.addEventListener('keyup', () => {
        clearTimeout(typingTimer);
        feedback.innerText = '';
        if (usernameInput.value) {
            feedback.innerText = 'Checking...';
            feedback.className = 'position-absolute end-0 bottom-0 mb-2 me-3 text-muted small fw-medium';
            typingTimer = setTimeout(checkUsername, doneTypingInterval);
        }
    });

    usernameInput.addEventListener('keydown', () => {
        clearTimeout(typingTimer);
    });

    async function checkUsername() {
        const username = usernameInput.value;
        if (!username) return;

        try {
            const response = await fetch('/api/check_username?username=' + encodeURIComponent(username));
            const data = await response.json();

            if (data.available) {
                feedback.innerText = 'Available ✓';
                feedback.className = 'position-absolute end-0 bottom-0 mb-2 me-3 text-success small fw-medium';
                usernameInput.style.borderColor = 'var(--success)';
            } else {
                feedback.innerText = 'Taken ✗';
                feedback.className = 'position-absolute end-0 bottom-0 mb-2 me-3 text-danger small fw-medium';
                usernameInput.style.borderColor = 'var(--danger)';
            }
        } catch (error) {
            console.error("Error checking username", error);
            feedback.innerText = '';
        }
    }
</script>
{% endblock %}
