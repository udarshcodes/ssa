{% extends "layout.html" %}

{% block title %}
    Reset Password
{% endblock %}

{% block main %}
<div class="auth-container glass-card mx-auto mt-5 position-relative shadow-lg border-0" style="background: rgba(24, 24, 27, 0.8);">
    
    <div class="text-center mb-4">
        <h2 class="mb-2 fw-bold">Reset Password</h2>
        <p class="text-muted small">Enter your username and a new password</p>
    </div>

    <form action="/reset_password" method="post" class="d-flex flex-column gap-3">
        <div class="form-group text-start">
            <label for="reset-username" class="form-label">Username</label>
            <input autocomplete="off" autofocus class="form-control" id="reset-username" name="username" type="text" required>
        </div>
        
        <div class="form-group text-start">
            <label for="reset-password" class="form-label">New Password</label>
            <div class="input-group">
                <input class="form-control border-end-0" style="border-top-right-radius: 0; border-bottom-right-radius: 0;" id="reset-password" name="new_password" type="password" required>
                <button class="btn border border-start-0 px-3" type="button" style="border-top-right-radius: 10px; border-bottom-right-radius: 10px; background: rgba(255,255,255,0.03); border-color: var(--glass-border);" onclick="togglePassword('reset-password', 'eye-icon-reset1')">
                    <span id="eye-icon-reset1" class="text-muted d-flex align-items-center justify-content-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye-fill" viewBox="0 0 16 16">
                            <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/>
                            <path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/>
                        </svg>
                    </span>
                </button>
            </div>
        </div>

        <div class="form-group text-start">
            <label for="reset-confirmation" class="form-label">Confirm New Password</label>
            <div class="input-group">
                <input class="form-control border-end-0" style="border-top-right-radius: 0; border-bottom-right-radius: 0;" id="reset-confirmation" name="confirmation" type="password" required>
                <button class="btn border border-start-0 px-3" type="button" style="border-top-right-radius: 10px; border-bottom-right-radius: 10px; background: rgba(255,255,255,0.03); border-color: var(--glass-border);" onclick="togglePassword('reset-confirmation', 'eye-icon-reset2')">
                    <span id="eye-icon-reset2" class="text-muted d-flex align-items-center justify-content-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye-fill" viewBox="0 0 16 16">
                            <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/>
                            <path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/>
                        </svg>
                    </span>
                </button>
            </div>
        </div>

        <button class="btn btn-primary py-2 mt-3 w-100 fw-bold" type="submit">Update Password</button>
    </form>
    
    <div class="text-center mt-4">
        <a href="/login" class="text-muted small text-decoration-none">Back to Login</a>
    </div>

</div>

<script>
    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('text-muted', 'text-primary');
        } else {
            input.type = "password";
            icon.classList.replace('text-primary', 'text-muted');
        }
    }
</script>
{% endblock %}
