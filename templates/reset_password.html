{% extends "layout.html" %}

{% block title %}
    Reset Password
{% endblock %}

{% block main %}
<div class="auth-container mx-auto mt-4 mb-5 position-relative">
    
    <!-- Header matching the mock image layout -->
    <div class="text-center mb-4">
        <div class="d-flex justify-content-center align-items-center mb-2">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" width="48" height="48" style="border-radius: 12px;" class="me-3">
            <h2 class="mb-0 fw-bold">StudyForge</h2>
        </div>
        <p class="fw-bold small mt-3 text-uppercase text-light" style="letter-spacing: 2px;">Password Reset</p>
    </div>

    <!-- Reset Form -->
    <form action="/reset_password" method="post" class="d-flex flex-column gap-3">
        <div class="form-group text-start">
            <label for="username" class="form-label text-light small fw-bold mb-1">Username</label>
            <input autocomplete="off" autofocus class="form-control rounded-pill px-4 py-2 text-white" style="background: rgba(255,255,255,0.15);" id="username" name="username" type="text" required>
        </div>
        
        <div class="form-group text-start">
            <label for="new_password" class="form-label text-light small fw-bold mb-1">New Password</label>
            <div class="input-group">
                <input class="form-control px-4 py-2 text-white border-end-0" style="border-radius: 50rem 0 0 50rem; background: rgba(255,255,255,0.15);" id="new_password" name="new_password" type="password" required>
                <button class="btn border border-start-0" type="button" style="border-radius: 0 50rem 50rem 0; background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.1);" onclick="togglePassword('new_password', 'eye-icon-new')">
                    <span id="eye-icon-new" class="text-light d-flex align-items-center justify-content-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye-fill" viewBox="0 0 16 16">
                            <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/>
                            <path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/>
                        </svg>
                    </span>
                </button>
            </div>
        </div>

        <div class="form-group text-start">
            <label for="confirmation" class="form-label text-light small fw-bold mb-1">Confirm New Password</label>
            <div class="input-group">
                <input class="form-control px-4 py-2 text-white border-end-0" style="border-radius: 50rem 0 0 50rem; background: rgba(255,255,255,0.15);" id="confirmation" name="confirmation" type="password" required>
                <button class="btn border border-start-0" type="button" style="border-radius: 0 50rem 50rem 0; background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.1);" onclick="togglePassword('confirmation', 'eye-icon-conf')">
                    <span id="eye-icon-conf" class="text-light d-flex align-items-center justify-content-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye-fill" viewBox="0 0 16 16">
                            <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/>
                            <path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/>
                        </svg>
                    </span>
                </button>
            </div>
        </div>

        <button class="btn btn-primary rounded-pill py-2 mt-4 w-100 fw-bold shadow-lg" type="submit">Reset Password</button>

        <a href="/" class="btn btn-outline-light rounded-pill py-2 w-100 fw-bold mt-4" style="border-color: rgba(255,255,255,0.2);">
            Back to Landing Page
        </a>
        <div class="text-center mt-3">
            <a href="/login" class="text-light small text-decoration-none fw-bold">Return to Login</a>
        </div>
    </form>

</div>

<script>
    // Password Toggle Logic
    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === "password") {
            input.type = "text";
            icon.style.opacity = "0.5";
        } else {
            input.type = "password";
            icon.style.opacity = "1";
        }
    }
</script>
{% endblock %}
